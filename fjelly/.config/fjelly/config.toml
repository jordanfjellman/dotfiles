[workspace]
id = "fk-test"
name = "fk-test"
mode = "independent"
repositories = []

[llm]
provider = "anthropic"
api_key = ""
default_model = "claude-sonnet-4-20250514"
fallback_model = "claude-haiku-4-20250514"

[database]
path = "~/.local/share/fjelly/db.sqlite"

[budget]
total_daily = 50.0
per_repo_min = 5.0
shared_pool = 15.0
allocation_strategy = "even"

[eod]
strict = true
max_retries = 3
require_manual_signoff = false

[eod.criteria]
test = [
    "Compiles",
    "TestsPass",
]
feature = [
    "Compiles",
    "TestsPass",
    "NoLintErrors",
]
documentation = [
    "NoBrokenLinks",
    "ValidMarkdown",
]
research = ["NotesDocumented"]
bugfix = [
    "Compiles",
    "TestsPass",
    "RegressionTestPasses",
]
refactor = [
    "Compiles",
    "TestsPass",
    "NoLintErrors",
    "NoBehaviorChange",
]
maintenance = [
    "Compiles",
    "NoLintErrors",
]

[logging]
level = "info"

[features]
workspace = true
context_switching = false
crash_recovery = false
task_queue = false
real_ai = false
determinism = false
multi_repo_coordination = false
fair_rate_limiting = false
cross_repo_refactoring = false
smart_context_pruning = false
