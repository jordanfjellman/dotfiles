[daemon]
socket_path = "~/.local/share/fjelly/fj.sock"
auto_start = true

[defaults]
image = "fjelly:latest"
shell = "fish"
dotfiles_host_path = "~/code/personal/dotfiles"
notes_host_path = "~/code/personal/notes"
workspace_root = "~/.local/share/fjelly/volumes"
dotfiles_exclude_packages = ["opencode"]

# Secrets: map of env var name → source
# Sources: "file:/path/to/file" or "env:VAR_NAME"
[secrets]
ANTHROPIC_API_KEY = "file:~/.secrets/kiro-gateway-password"
GITHUB_TOKEN = "file:~/.secrets/github-token"

[skills]
opencode_skills_path = "~/code/personal/dotfiles/opencode/.config/opencode/skills"
claude_skills_path = ""
additional_skills_paths = [
  "~/code/personal/skills/.agents/skills",
  "~/code/personal/skills/skills",
  "~/code/personal/skills/.claude/skills",
  "~/code/personal/dotfiles/claude/.claude/hooks"
]

[profiles.default]
ports = []
auth_ports = []
env = {}

[profiles.web]
ports = [
  { host = 3000, container = 3000 },
  { host = 5173, container = 5173 },
]
auth_ports = [9876]
env = {}

[profiles.api]
ports = [
  { host = 8080, container = 8080 },
  { host = 5432, container = 5432 },
]
auth_ports = []
env = {}

[templates.dotfiles]
description = "Dotfiles workspace"
profile = "default"
repos = [
  { url = "git@github.com:jordanfjellman/dotfiles.git" },
  { url = "git@github.com:jordanfjellman/ansible.git" },
]
